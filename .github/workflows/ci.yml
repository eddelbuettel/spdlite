name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, compiler: gcc,   cc: gcc,    cxx: g++ }
          - { os: ubuntu-latest, compiler: clang, cc: clang,  cxx: clang++ }
          - { os: macos-latest,  compiler: clang, cc: clang,  cxx: clang++ }
          - { os: windows-latest, compiler: msvc }
    steps:
      - uses: actions/checkout@v4

      - name: Configure (POSIX)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLITE_BUILD_TESTS=ON .

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DSPDLITE_BUILD_TESTS=ON .

      - name: Build
        run: cmake --build build --config Release -j

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

  test-std-format:
    name: ubuntu-latest / gcc / SPDLITE_USE_STD_FORMAT
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPDLITE_BUILD_TESTS=ON -DCMAKE_CXX_FLAGS=-DSPDLITE_USE_STD_FORMAT .

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure
